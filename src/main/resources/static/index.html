<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充电站管理</title>
<link rel="stylesheet" href="/leaflet.min.css">
<script src="/vue.min.js"></script>
<script src="/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh}
#app{height:100vh;display:flex;flex-direction:column}
.header{height:52px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.header .logo{font-size:17px;font-weight:700;color:#16a34a;white-space:nowrap}
.header .spacer{flex:1}
.header button{padding:7px 14px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.header button:hover{background:#f1f5f9}
.header .btn-add{background:#16a34a;color:#fff;border-color:#16a34a;font-weight:600}
.header .btn-add:hover{background:#15803d}
.header .btn-import-pile{background:#1e40af;color:#fff;border-color:#1e40af;font-weight:600}
.header .btn-import-pile:hover{background:#1e3a8a}
.header .btn-photo-review{background:#7c3aed;color:#fff;border-color:#7c3aed;font-weight:600}
.header .btn-photo-review:hover{background:#6d28d9}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:380px;min-width:380px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column}
.sidebar-toolbar{padding:10px 14px;border-bottom:1px solid #e2e8f0;display:flex;flex-direction:column;gap:8px}
.sidebar-toolbar input,.sidebar-toolbar select{padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;width:100%}
.sidebar-toolbar input:focus,.sidebar-toolbar select:focus{border-color:#16a34a}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.card{padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.card:hover{border-color:#16a34a}
.card.active{border-color:#16a34a;background:#f0fdf4}
.card h3{font-size:14px;font-weight:600}
.card .addr{font-size:12px;color:#64748b;margin-top:3px}
.card .tags{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;background:#dcfce7;color:#166534}
.card .meta{margin-top:6px;font-size:11px;color:#64748b;display:flex;gap:10px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-open{background:#dcfce7;color:#166534}
.badge-closed{background:#fee2e2;color:#991b1b}
.badge-maint{background:#fef3c7;color:#92400e}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
.empty{text-align:center;padding:40px 20px;color:#94a3b8}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;width:520px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.modal-sm{width:380px}
.modal-head{padding:14px 18px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-head h2{font-size:16px}
.modal-body{padding:18px}
.modal-foot{padding:12px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
.f-group{margin-bottom:14px}
.f-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
.f-group input,.f-group select,.f-group textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.f-group input:focus,.f-group select:focus,.f-group textarea:focus{border-color:#16a34a}
.f-group textarea{resize:vertical;min-height:60px}
.f-row{display:flex;gap:10px}
.f-row .f-group{flex:1}
.toast{position:fixed;top:16px;right:16px;z-index:10000;padding:10px 18px;border-radius:8px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast-ok{background:#dcfce7;color:#166534}
.toast-err{background:#fee2e2;color:#991b1b}
.drop-zone{border:2px dashed #93c5fd;border-radius:12px;padding:40px 20px;text-align:center;transition:all .2s;cursor:pointer;background:#f8faff}
.drop-zone:hover,.drop-zone.drag-over{border-color:#2563eb;background:#eff6ff}
.drop-zone .dz-icon{font-size:48px;margin-bottom:12px}
.drop-zone .dz-title{font-size:15px;font-weight:600;color:#1e40af;margin-bottom:6px}
.drop-zone .dz-hint{font-size:12px;color:#64748b;margin-bottom:16px}
.drop-zone .dz-formats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.drop-zone .dz-format-tag{padding:4px 10px;background:#dbeafe;color:#1e40af;border-radius:20px;font-size:11px;font-weight:500}
.import-preview{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px;margin-top:14px}
.import-preview table{width:100%;font-size:12px;border-collapse:collapse}
.import-preview th{text-align:left;padding:4px 8px;color:#166534;border-bottom:1px solid #bbf7d0}
.import-preview td{padding:4px 8px;color:#14532d}
.coord-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:14px}
.coord-row .f-group{flex:1;margin-bottom:0}
.btn-coord-add{padding:8px 16px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
.btn-coord-add:hover{background:#1d4ed8}
.coord-list{background:#f8fafc;border-radius:8px;padding:10px;margin-top:8px;max-height:150px;overflow-y:auto}
.coord-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#fff;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:4px;font-size:13px}
.coord-item .coord-text{color:#475569}
.coord-item .coord-del{color:#dc2626;cursor:pointer;padding:2px 6px;border:1px solid #fecaca;border-radius:4px;background:#fff;font-size:11px}
.coord-item .coord-del:hover{background:#fee2e2}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7;transform:translateX(-50%) scale(1.05)}}
.map-wrap.picking{cursor:crosshair}
.map-wrap.picking #map{cursor:crosshair!important}
@media(max-width:768px){.main{flex-direction:column}.sidebar{width:100%;min-width:100%;max-height:40%}.map-wrap{height:60%}}
</style>
</head>
<body>
<div id="app">
  <!-- ============ LOGIN ============ -->
  <div v-if="view==='login'" style="height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf4,#dcfce7,#bbf7d0)">
    <div style="text-align:center;width:420px;max-width:90vw;">
      <div style="font-size:48px;margin-bottom:8px">⚡</div>
      <h1 style="font-size:28px;font-weight:700;color:#166534;margin-bottom:4px">充电站管理平台</h1>
      <p style="color:#64748b;margin-bottom:28px;font-size:14px">新能源汽车充电服务</p>
      <div style="display:flex;margin-bottom:20px;background:#fff;border-radius:10px;overflow:hidden">
        <div @click="loginTab='user';loginUser='';loginPass='';loginErr=''" style="flex:1;padding:12px;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s" :style="loginTab==='user'?{background:'#16a34a',color:'#fff'}:{background:'#fff',color:'#64748b'}">👤 用户</div>
        <div @click="loginTab='admin';loginUser='';loginPass='';loginErr=''" style="flex:1;padding:12px;cursor:pointer;font-weight:600;font-size:14px;transition:all .2s" :style="loginTab==='admin'?{background:'#16a34a',color:'#fff'}:{background:'#fff',color:'#64748b'}">🔧 管理员</div>
      </div>
      <div style="background:#fff;padding:24px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:left">
        <div class="f-group"><label>用户名</label><input v-model="loginUser" placeholder="请输入用户名" @keyup.enter="doLogin"></div>
        <div class="f-group"><label>密码</label><input v-model="loginPass" type="password" placeholder="请输入密码" @keyup.enter="doLogin"></div>
        <div class="f-group" v-if="loginTab==='user'&&loginMode==='register'"><label>手机号（选填）</label><input v-model="loginPhone" placeholder="请输入手机号"></div>
        <div v-if="loginTab==='user'" style="font-size:12px;color:#64748b;margin-bottom:12px;text-align:right">
          <span v-if="loginMode==='login'">没有账号？<a href="#" @click.prevent="loginMode='register';loginUser='';loginPass='';loginErr=''" style="color:#16a34a">立即注册</a></span>
          <span v-else>已有账号？<a href="#" @click.prevent="loginMode='login';loginUser='';loginPass='';loginErr=''" style="color:#16a34a">去登录</a></span>
        </div>
        <button @click="doLogin" :disabled="loading" style="width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600">{{loading?'处理中...':(loginTab==='user'&&loginMode==='register'?'注 册':'登 录')}}</button>
        <div v-if="loginErr" style="color:#dc2626;font-size:13px;text-align:center;margin-top:8px">{{loginErr}}</div>
      </div>
    </div>
  </div>

  <!-- ============ ADMIN VIEW ============ -->
  <template v-if="view==='admin'">
  <div class="header">
    <span class="logo">⚡ 充电站管理</span>
    <span style="font-size:12px;color:#64748b">管理员：{{currentUser?.username}}</span>
    <span class="spacer"></span>
    <button @click="adminExport">📥 导出</button>
    <button @click="triggerImport">📤 导入</button>
    <button class="btn-import-pile" @click="openPileImport">📌 导入充电桩</button>
    <button class="btn-photo-review" @click="openPhotoReview">🖼️ 照片审核 <span v-if="pendingPhotos.length" style="background:#dc2626;color:#fff;border-radius:50%;padding:1px 6px;font-size:11px;margin-left:4px">{{pendingPhotos.length}}</span></button>
    <button @click="openAuditLog">📋 审核记录</button>
    <button @click="openCodeGen">🎫 兑换码</button>
    <button @click="openSendCards">📨 发送卡片</button>
    <button @click="openBatchIssue">📦 批量发放</button>
    <button class="btn-add" @click="openAddForm">➕ 添加充电站</button>
    <button @click="doLogout" style="background:#f1f5f9">🚪 退出</button>
    <input type="file" accept=".json" style="display:none" ref="fileIn" @change="adminImport">
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-toolbar">
        <input type="text" v-model="search" placeholder="🔍 搜索名称、地址...">
        <select v-model="filterStatus"><option value="all">全部状态</option><option value="open">✅ 营业中</option><option value="closed">❌ 已关闭</option><option value="maintenance">🔧 维护中</option></select>
        <div style="font-size:12px;color:#94a3b8">共 {{filtered.length}} 个</div>
      </div>
      <div class="sidebar-list">
        <div v-if="filtered.length===0" class="empty"><p v-if="stations.length===0">还没有充电站</p><p v-else>无匹配结果</p></div>
        <div v-for="s in filtered" :key="s.id" class="card" :class="{active:selectedId===s.id}" @click="selectStation(s)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start"><h3>{{s.name}}</h3><span class="badge" :class="s.status==='open'?'badge-open':s.status==='maintenance'?'badge-maint':'badge-closed'">{{statusText(s.status)}}</span></div>
          <div class="addr">📍 {{s.address||'未填写'}}</div>
          <div class="tags"><span class="tag" v-for="t in s.chargerTypes">{{t}}</span></div>
          <div class="meta"><span>🔌 {{(s.piles||[]).length}}桩</span><span>🅿️ {{s.availableSpots}}/{{s.totalSpots}}</span></div>
        </div>
      </div>
    </div>
    <div class="map-wrap" :class="{picking:picking}"><div id="map"></div>
      <div v-if="picking" style="position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:1000;background:#16a34a;color:#fff;padding:12px 24px;border-radius:30px;font-size:15px;font-weight:600;box-shadow:0 4px 20px rgba(22,163,74,.4);animation:pulse 1.5s infinite;pointer-events:none">👆 请在地图上点击选择位置</div>
    </div>
  </div>
  <!-- Admin Form Modal -->
  <div class="modal-mask" v-if="showForm" @click.self="closeForm">
    <div class="modal">
      <div class="modal-head"><h2>{{editingId?'编辑':'添加'}}充电站</h2><button style="border:none;background:none;cursor:pointer;font-size:18px" @click="closeForm">✕</button></div>
      <div class="modal-body">
        <div v-if="!editingId" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:14px">
          <div style="font-size:13px;font-weight:600;color:#475569;margin-bottom:8px">📍 位置</div>
          <div class="f-row"><div class="f-group"><label style="font-size:11px;color:#64748b">经度</label><input v-model.number="form.longitude" type="number" step="0.000001" placeholder="125.1036"></div><div class="f-group"><label style="font-size:11px;color:#64748b">纬度</label><input v-model.number="form.latitude" type="number" step="0.000001" placeholder="46.5982"></div></div>
          <button @click="pickOnMap" style="width:100%;padding:7px;border:1px dashed #16a34a;border-radius:5px;background:#f0fdf4;color:#16a34a;cursor:pointer;font-size:12px">👆 或点击地图获取坐标</button>
        </div>
        <div class="f-group"><label>名称 *</label><input v-model="form.name" placeholder="充电站名称"></div>
        <div class="f-group"><label>地址</label><input v-model="form.address" placeholder="详细地址"></div>
        <div class="f-row"><div class="f-group"><label>运营商</label><input v-model="form.operator"></div><div class="f-group"><label>状态</label><select v-model="form.status"><option value="open">✅ 营业中</option><option value="closed">❌ 已关闭</option><option value="maintenance">🔧 维护中</option></select></div></div>
        <div class="f-row"><div class="f-group"><label>营业时间</label><input v-model="form.openHours" placeholder="00:00-24:00"></div><div class="f-group"><label>电话</label><input v-model="form.phone"></div></div>
        <div class="f-group"><label>备注</label><textarea v-model="form.desc" placeholder="备注信息"></textarea></div>
        <!-- Piles -->
        <div style="border-top:2px solid #e2e8f0;padding-top:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><strong style="font-size:15px">🔌 充电桩</strong><span style="font-size:12px;color:#64748b">{{form.piles.length}}个</span></div>
          <div v-if="form.piles.length>0" style="margin-bottom:12px">
            <div v-for="p in form.piles" :key="p.id" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8fafc;border-radius:6px;margin-bottom:6px;font-size:13px">
              <template v-if="editingPile===p.id">
                <input v-model="pileForm.name" style="width:60px;padding:4px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
                <select v-model="pileForm.type" style="width:68px;padding:4px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px"><option>快充</option><option>慢充</option><option>超快充</option><option>特斯拉</option></select>
                <input v-model.number="pileForm.power" type="number" placeholder="kW" style="width:50px;padding:4px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
                <input v-model.number="pileForm.price" type="number" step="0.01" placeholder="¥" style="width:60px;padding:4px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
                <select v-model="pileForm.status" style="width:68px;padding:4px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px"><option value="open">空闲</option><option value="in_use">使用中</option><option value="maintenance">维护中</option><option value="closed">停用</option></select>
                <button @click="saveEditPile" style="padding:3px 8px;background:#16a34a;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px">✓</button>
                <button @click="cancelEditPile" style="padding:3px 8px;background:#94a3b8;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px">✕</button>
              </template>
              <template v-else>
                <span style="font-weight:600;min-width:55px">{{p.name}}</span><span class="tag">{{p.type}}</span>
                <span style="color:#64748b">{{p.power}}kW ¥{{p.price}}/度</span>
                <span class="badge" :class="p.status==='open'?'badge-open':p.status==='in_use'?'badge-maint':'badge-closed'" style="font-size:10px">{{pileStatusText[p.status]}}</span>
                <span style="flex:1"></span>
                <button @click="startEditPile(p)" style="padding:3px 8px;border:1px solid #e2e8f0;background:#fff;border-radius:3px;cursor:pointer;font-size:11px">✏️</button>
                <button @click="removePile(p.id)" style="padding:3px 8px;border:1px solid #fee2e2;color:#dc2626;background:#fff;border-radius:3px;cursor:pointer;font-size:11px">🗑</button>
              </template>
            </div>
          </div>
          <div v-if="editingPile===null" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:8px 10px;background:#f0fdf4;border-radius:6px">
            <input v-model="pileForm.name" placeholder="名称" style="width:65px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
            <select v-model="pileForm.type" style="width:70px;padding:5px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px"><option>快充</option><option>慢充</option><option>超快充</option><option>特斯拉</option></select>
            <input v-model.number="pileForm.power" type="number" placeholder="kW" style="width:55px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
            <input v-model.number="pileForm.price" type="number" step="0.01" placeholder="¥/度" style="width:65px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px">
            <select v-model="pileForm.status" style="width:68px;padding:5px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px"><option value="open">空闲</option><option value="in_use">使用中</option><option value="maintenance">维护中</option><option value="closed">停用</option></select>
            <button @click="addPile" style="padding:5px 14px;background:#16a34a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">➕ 添加</button>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button @click="closeForm" style="padding:8px 16px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer">取消</button>
        <button @click="saveStation" :disabled="!form.name||saving" style="padding:8px 16px;background:#16a34a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600">{{saving?'保存中...':'保存'}}</button>
      </div>
    </div>
  </div>
  <div class="toast" :class="toast.type==='err'?'toast-err':'toast-ok'" v-if="toast.text" style="top:68px">{{toast.text}}</div>

  <!-- Import Pile Modal -->
  <div class="modal-mask" v-if="showPileImport" @click.self="closePileImport">
    <div class="modal" style="width:620px">
      <div class="modal-head"><h2>📌 导入充电桩数据</h2><button style="border:none;background:none;cursor:pointer;font-size:18px" @click="closePileImport">✕</button></div>
      <div class="modal-body">
        <!-- Step 1: Manual coordinate entry -->
        <div style="margin-bottom:18px">
          <div style="font-size:14px;font-weight:600;color:#1e40af;margin-bottom:10px">📍 方式一：手动输入坐标</div>
          <div class="coord-row">
            <div class="f-group"><label style="font-size:11px;color:#64748b">经度 (Longitude)</label><input v-model="pileCoordLng" type="number" step="0.000001" placeholder="125.1036"></div>
            <div class="f-group"><label style="font-size:11px;color:#64748b">纬度 (Latitude)</label><input v-model="pileCoordLat" type="number" step="0.000001" placeholder="46.5982"></div>
            <button class="btn-coord-add" @click="addCoordToList">➕ 添加</button>
          </div>
          <div class="coord-list" v-if="pileCoordList.length>0">
            <div class="coord-item" v-for="(c,i) in pileCoordList" :key="i">
              <span class="coord-text">📍 ({{c.lng}}, {{c.lat}})</span>
              <button class="coord-del" @click="pileCoordList.splice(i,1)">删除</button>
            </div>
          </div>
          <div v-else style="text-align:center;padding:14px;color:#94a3b8;font-size:12px;background:#f8fafc;border-radius:8px;margin-top:8px">尚未添加坐标，添加后将在地图上标记位置</div>
        </div>

        <!-- Step 2: File drag & drop -->
        <div style="border-top:2px solid #e2e8f0;padding-top:18px">
          <div style="font-size:14px;font-weight:600;color:#1e40af;margin-bottom:10px">📁 方式二：拖入文件批量导入</div>
          <div class="drop-zone"
               :class="{'drag-over':pileDragOver}"

        <div style="display:flex;gap:8px;margin-bottom:14px;padding:10px;background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px">
          <input v-model="redeemCode" placeholder="输入兑换码" style="flex:1;padding:8px 10px;border:1px solid #c4b5fd;border-radius:6px;font-size:13px;outline:none;text-transform:uppercase" @keyup.enter="doRedeem">
          <button @click="doRedeem" :disabled="redeemBusy" style="padding:8px 16px;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;white-space:nowrap;font-size:13px">{{redeemBusy?'...':'兑换'}}</button>
        </div>
        <div v-if="cardList.length===0" style="text-align:center;padding:30px;color:#94a3b8">
          <div style="font-size:40px;margin-bottom:8px">🎫</div>
          <div style="font-size:14px">还没有电费卡</div>
          <div style="font-size:12px;margin-top:4px">上传充电站照片通过审核、或用兑换码兑换即可获得</div>
        </div>
        <div v-for="c in cardList" :key="c.id" style="display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:8px;margin-bottom:8px" :style="c.status==='revoked'?'background:#f1f5f9;border:1px solid #cbd5e1;filter:grayscale(1);opacity:0.7':'background:#fffbeb;border:1px solid #fde68a'">
          <div>
            <div style="font-size:14px;font-weight:600" :style="c.status==='revoked'?'color:#94a3b8;text-decoration:line-through':'color:#92400e'">⚡ {{c.stationName||'奖励卡'}}</div>
            <div style="font-size:10px;color:#94a3b8;margin-top:2px">🆔 {{c.id}}</div>
            <div style="font-size:10px;color:#94a3b8">👤 审核员：{{c.adminName||'系统'}} · 🕐 {{c.createdAt}}</div>
            <div v-if="c.status==='revoked'" style="font-size:10px;color:#dc2626;margin-top:2px">⚠️ 已被追回 · 无法使用</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:22px;font-weight:700" :style="c.status==='revoked'?'color:#94a3b8':'color:#d97706'">¥{{c.amount}}</div>
            <button v-if="c.status==='revoked'" @click="deleteRevokedCard(c.id)" style="margin-top:4px;padding:2px 10px;background:#e2e8f0;color:#64748b;border:none;border-radius:4px;cursor:pointer;font-size:10px">🗑 删除</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" :class="toast.type==='err'?'toast-err':'toast-ok'" v-if="toast.text" style="top:68px">{{toast.text}}</div>
  </template>
</div>

<script>
const {createApp,ref,computed,watch,onMounted,onUnmounted}=Vue
const API=''  // Same origin, Spring Boot serves both

let map=null,markerLayer=null

const icons={
  open:L.icon({iconUrl:mkSvg('#16a34a'),iconSize:[32,44],iconAnchor:[16,44],popupAnchor:[0,-44]}),
  closed:L.icon({iconUrl:mkSvg('#dc2626'),iconSize:[32,44],iconAnchor:[16,44],popupAnchor:[0,-44]}),
  maintenance:L.icon({iconUrl:mkSvg('#f59e0b'),iconSize:[32,44],iconAnchor:[16,44],popupAnchor:[0,-44]}),
  in_use:L.icon({iconUrl:mkSvg('#f59e0b'),iconSize:[32,44],iconAnchor:[16,44],popupAnchor:[0,-44]})
}
function mkSvg(c){return'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 44"><path d="M16 0C7.2 0 0 7.2 0 16c0 12 16 28 16 28s16-16 16-28C32 7.2 24.8 0 16 0z" fill="'+c+'"/><circle cx="16" cy="15" r="8" fill="white"/><circle cx="16" cy="15" r="4" fill="'+c+'"/></svg>')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function initMap(){
  const el=document.getElementById('map')
  if(!el||map)return
  map=L.map(el,{center:[46.5892,125.0036],zoom:12})
  const gd=L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'高德'})
  const gs=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'卫星'})
  gd.addTo(map)
  L.control.layers({'高德地图':gd,'高德卫星':gs},null,{position:'topright'}).addTo(map)
  L.control.scale({metric:true,imperial:false,position:'bottomleft'}).addTo(map)
  markerLayer=L.layerGroup().addTo(map)
}

function refreshMarkers(stations,opts={}){
  if(!markerLayer)return
  markerLayer.clearLayers()
  stations.forEach(s=>{
    const m=L.marker([s.latitude,s.longitude],{icon:icons[s.status]||icons.open})
    const piles=s.piles||[],openCnt=piles.filter(p=>p.status==='open').length
    const pileTags=piles.map(p=>'<span style="display:inline-block;margin:1px;padding:1px 5px;border-radius:3px;font-size:10px;'+(p.status==='open'?'background:#dcfce7;color:#166534':'background:#fee2e2;color:#991b1b')+'">'+esc(p.name)+'</span>').join('')
    const btns=opts.isAdmin
      ?'<button onclick="window._editStation(\''+s.id+'\')" style="margin-top:6px;padding:4px 12px;background:#16a34a;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:4px">编辑</button><button onclick="window._delStation(\''+s.id+'\')" style="padding:4px 12px;background:#dc2626;color:#fff;border:none;border-radius:4px;cursor:pointer">删除</button>'
      :'<button onclick="window._userView(\''+s.id+'\')" style="margin-top:6px;padding:4px 12px;background:#16a34a;color:#fff;border:none;border-radius:4px;cursor:pointer">查看充电桩</button>'
    m.bindPopup(L.popup().setContent('<div><b>'+esc(s.name)+'</b><br>📍 '+esc(s.address||'')+'<br>🔌 '+piles.length+'桩('+openCnt+'空闲)<br>'+pileTags+'<br>'+btns+'</div>'))
    m.on('click',()=>{if(opts.onClick)opts.onClick(s)})
    markerLayer.addLayer(m)
  })
}

function flyTo(s){if(!map)return;map.flyTo([s.latitude,s.longitude],16,{duration:.8});markerLayer.eachLayer(m=>{const ll=m.getLatLng();if(ll.lat===s.latitude&&ll.lng===s.longitude)m.openPopup()})}

const app=createApp({setup(){
  const view=ref('login'),currentUser=ref(null),token=ref('')
  const loginTab=ref('user'),loginMode=ref('login'),loginUser=ref(''),loginPass=ref(''),loginPhone=ref(''),loginErr=ref(''),loading=ref(false)
  const stations=ref([]),sessions=ref([]),search=ref(''),filterStatus=ref('all'),selectedId=ref(null)
  const showForm=ref(false),editingId=ref(null),picking=ref(false),saving=ref(false)
  const editingPile=ref(null),pileForm=ref({name:'',type:'快充',power:0,price:0,status:'open'})
  const showStation=ref(false),detailStation=ref(null)
  const showPay=ref(false),payTarget=ref(null),payDur=ref(1),paying=ref(false)
  const showSessions=ref(false),toast=ref({text:'',type:'ok'}),fileIn=ref(null)
  const showPileImport=ref(false),pileDragOver=ref(false),pileCoordLng=ref(''),pileCoordLat=ref(''),pileCoordList=ref([]),pileFileName=ref(''),pileFileIn=ref(null)
  const stationPhotos=ref([]),pendingPhotos=ref([]),showPhotoReview=ref(false),photoFileIn=ref(null),photoUploading=ref(false),currentPhotoStationId=ref('')
  const defaultCardCount=ref(1),defaultCardAmount=ref(10),reviewCardCounts=ref({}),reviewCardAmounts=ref({}),cardList=ref([]),showCards=ref(false)
  // Audit log, codes, send cards, batch
  const showAuditLog=ref(false),auditLog=ref([]),showCodeGen=ref(false),genCount=ref(10),genAmount=ref(10),genBusy=ref(false),genResult=ref([])
  const showSendCards=ref(false),sendUsername=ref(''),sendCount=ref(1),sendAmount=ref(10),sendBusy=ref(false)
  const showBatchIssue=ref(false),batchFileIn=ref(null)
  const redeemCode=ref(''),redeemBusy=ref(false)
  const pileStatusText={open:'空闲',in_use:'使用中',maintenance:'维护中',closed:'已停用'}

  const form=ref({name:'',address:'',longitude:0,latitude:0,operator:'',totalSpots:0,availableSpots:0,power:0,chargerTypes:[],price:0,openHours:'00:00-24:00',phone:'',status:'open',desc:'',piles:[]})

  const filtered=computed(()=>{
    let list=stations.value
    if(search.value){const q=search.value.toLowerCase();list=list.filter(s=>s.name.toLowerCase().includes(q)||s.address.toLowerCase().includes(q)||s.operator.toLowerCase().includes(q))}
    if(filterStatus.value!=='all')list=list.filter(s=>s.status===filterStatus.value)
    return list
  })
  const activeSessions=computed(()=>sessions.value.filter(s=>s.status==='active'))

  async function api(url,opts={}){
    const headers={'Content-Type':'application/json'}
    if(token.value)headers['Authorization']='Bearer '+token.value
    const res=await fetch(API+url,{headers,...opts,body:opts.body?JSON.stringify(opts.body):undefined})
    const data=await res.json()
    if(!res.ok)throw new Error(data.detail||data.message||'请求失败')
    return data
  }

  async function doLogin(){
    loginErr.value=''
    if(!loginUser.value||!loginPass.value){loginErr.value='请输入用户名和密码';return}
    loading.value=true
    try{
      if(loginTab.value==='user'&&loginMode.value==='register'){
        const res=await api('/api/register',{method:'POST',body:{username:loginUser.value,password:loginPass.value,phone:loginPhone.value}})
        showToast('注册成功，请登录');loginMode.value='login';loginPass.value='';loginErr.value=''
      }else{
        const res=await api('/api/login',{method:'POST',body:{username:loginUser.value,password:loginPass.value}})
        token.value=res.token;currentUser.value=res.user;view.value=res.user.role==='admin'?'admin':'user'
      }
      if(view.value!=='login'){await loadData();setTimeout(initMapAfterView,300)}
    }catch(e){loginErr.value=e.message}finally{loading.value=false}
  }

  function doLogout(){view.value='login';currentUser.value=null;token.value='';loginUser.value='';loginPass.value='';loginErr.value='';stations.value=[];sessions.value=[];if(map){map.remove();map=null;markerLayer=null};showForm.value=false;showStation.value=false;showPay.value=false;showSessions.value=false}

  async function loadData(){
    if(view.value==='admin'||view.value==='user'){
      stations.value=await api('/api/stations')
      if(view.value==='user')sessions.value=await api('/api/sessions')
      if(view.value==='admin')loadPendingPhotos()
    }
  }

  function initMapAfterView(){
    setTimeout(()=>{
      if(!document.getElementById('map'))return
      if(!map)initMap();else map.invalidateSize()
      if(stations.value.length)refreshMarkers(stations.value,{isAdmin:view.value==='admin',onClick:s=>{if(view.value==='admin')selectedId.value=s.id;else{detailStation.value=s;showStation.value=true;loadStationPhotos(s.id)}}})
      if(map&&view.value==='admin')map.on('click',e=>{if(picking.value){form.value.latitude=e.latlng.lat;form.value.longitude=e.latlng.lng;picking.value=false;showForm.value=true;showToast('已获取坐标')}})
    },300)
  }

  watch(view,v=>{if(v!=='login')initMapAfterView()})

  function openAddForm(){editingId.value=null;editingPile.value=null;form.value={name:'',address:'',longitude:0,latitude:0,operator:'',totalSpots:0,availableSpots:0,power:0,chargerTypes:[],price:0,openHours:'00:00-24:00',phone:'',status:'open',desc:'',piles:[]};showForm.value=false;picking.value=true;showToast('请在地图上点击选择位置')}
  function pickOnMap(){showForm.value=false;picking.value=true;showToast('请在地图上点击选择位置')}
  function closeForm(){showForm.value=false;editingId.value=null;editingPile.value=null;picking.value=false}
  // ====== Import Pile ======
  function openPileImport(){showPileImport.value=true;pileCoordList.value=[];pileCoordLng.value='';pileCoordLat.value='';pileFileName.value=''}
  function closePileImport(){showPileImport.value=false;pileDragOver.value=false;pileFileName.value=''}
  function addCoordToList(){if(pileCoordLng.value&&pileCoordLat.value){pileCoordList.value.push({lng:Number(pileCoordLng.value),lat:Number(pileCoordLat.value)});pileCoordLng.value='';pileCoordLat.value='';showToast('坐标已添加')}}
  function triggerPileFile(){pileFileIn.value.click()}
  function handlePileDrop(e){pileDragOver.value=false;const f=e.dataTransfer.files[0];if(f){pileFileName.value=f.name;showToast('文件已接收：'+f.name)}}
  function handlePileFile(e){const f=e.target.files[0];if(f){pileFileName.value=f.name;showToast('文件已选择：'+f.name)}}
  // ====== Photos ======
  async function loadStationPhotos(sid){try{stationPhotos.value=await api('/api/stations/'+sid+'/photos')}catch(e){stationPhotos.value=[]}}
  async function loadPendingPhotos(){try{pendingPhotos.value=await api('/api/admin/photos/pending');pendingPhotos.value.forEach(p=>{reviewCardCounts.value[p.id]=defaultCardCount.value;reviewCardAmounts.value[p.id]=defaultCardAmount.value})}catch(e){pendingPhotos.value=[]}}
  function triggerPhotoUpload(station){currentPhotoStationId.value=station.id;photoFileIn.value.click()}
  async function handlePhotoUpload(e){
    const f=e.target.files[0];if(!f)return;photoUploading.value=true
    try{
      const fd=new FormData();fd.append('file',f)
      const headers={};if(token.value)headers['Authorization']='Bearer '+token.value
      const res=await fetch(API+'/api/stations/'+currentPhotoStationId.value+'/photos',{method:'POST',headers,body:fd})
      const data=await res.json();if(!res.ok)throw new Error(data.detail||data.message||'上传失败')
      showToast(data.message||'上传成功');await loadStationPhotos(currentPhotoStationId.value)
    }catch(e){showToast(e.message,'err')}finally{photoUploading.value=false;photoFileIn.value.value=''}
  }
  async function openPhotoReview(){
    showPhotoReview.value=true
    try{const d=await api('/api/admin/card-defaults');defaultCardCount.value=d.defaultCardCount||1;defaultCardAmount.value=d.defaultCardAmount||10}catch(e){}
    loadPendingPhotos()
  }
  function closePhotoReview(){showPhotoReview.value=false}
  async function approvePhoto(pid){
    const cnt=reviewCardCounts.value[pid]||defaultCardCount.value
    const amt=reviewCardAmounts.value[pid]||defaultCardAmount.value
    try{const res=await api('/api/admin/photos/'+pid+'/approve',{method:'PUT',body:{cardCount:cnt,cardAmount:amt}});showToast(res.message);loadPendingPhotos()}catch(e){showToast(e.message,'err')}
  }
  async function rejectPhoto(pid){try{await api('/api/admin/photos/'+pid+'/reject',{method:'PUT'});showToast('已驳回');loadPendingPhotos()}catch(e){showToast(e.message,'err')}}
  async function saveCardDefaults(){try{await api('/api/admin/card-defaults',{method:'PUT',body:{defaultCardCount:defaultCardCount.value,defaultCardAmount:defaultCardAmount.value}});showToast('默认值已保存')}catch(e){showToast(e.message,'err')}}
  async function openCardDetail(){showCards.value=true;try{const res=await api('/api/user/cards');cardList.value=res.cards||[]}catch(e){cardList.value=[]}}
  // ====== Audit log ======
  async function openAuditLog(){showAuditLog.value=true;try{auditLog.value=await api('/api/admin/cards/audit')}catch(e){auditLog.value=[]}}
  async function revokeByPhoto(pid){if(!confirm('追回该照片发放的全部有效电费卡？'))return;try{await api('/api/admin/cards/revoke-by-photo/'+pid,{method:'PUT'});showToast('已追回');openAuditLog()}catch(e){showToast(e.message,'err')}}
  async function revokeCard(cid){if(!confirm('追回该电费卡？'))return;try{await api('/api/admin/cards/'+cid+'/revoke',{method:'PUT'});showToast('已追回');openAuditLog()}catch(e){showToast(e.message,'err')}}
  // ====== Codes ======
  function openCodeGen(){showCodeGen.value=true;genResult.value=[];genCount.value=10;genAmount.value=10}
  async function generateCodes(){genBusy.value=true;try{const res=await api('/api/admin/codes/generate',{method:'POST',body:{count:genCount.value,amount:genAmount.value}});genResult.value=res.codes||[];showToast(res.message)}catch(e){showToast(e.message,'err')}finally{genBusy.value=false}}
  // ====== Send cards ======
  function openSendCards(){showSendCards.value=true;sendUsername.value='';sendCount.value=1;sendAmount.value=10}
  async function doSendCards(){if(!sendUsername.value){showToast('请输入用户名','err');return};sendBusy.value=true;try{const res=await api('/api/admin/cards/send',{method:'POST',body:{username:sendUsername.value,count:sendCount.value,amount:sendAmount.value}});showToast(res.message);showSendCards.value=false}catch(e){showToast(e.message,'err')}finally{sendBusy.value=false}}
  // ====== Batch ======
  function openBatchIssue(){showBatchIssue.value=true}
  function triggerBatchFile(){batchFileIn.value.click()}
  async function handleBatchFile(e){const f=e.target.files[0];if(f){showToast('文件已选择：'+f.name)}}
  async function doBatchIssue(){try{const res=await api('/api/admin/cards/batch',{method:'POST'});showToast(res.message)}catch(e){showToast(e.message,'err')}}
  // ====== Redeem ======
  async function doRedeem(){if(!redeemCode.value){showToast('请输入兑换码','err');return};redeemBusy.value=true;try{const res=await api('/api/user/redeem',{method:'POST',body:{code:redeemCode.value}});showToast(res.message);redeemCode.value='';openCardDetail()}catch(e){showToast(e.message,'err')}finally{redeemBusy.value=false}}
  async function deleteRevokedCard(cid){if(!confirm('确认删除该卡片？'))return;try{await api('/api/user/cards/'+cid,{method:'DELETE'});showToast('已删除');openCardDetail()}catch(e){showToast(e.message,'err')}}
  function selectStation(s){selectedId.value=s.id;flyTo(s)}

  async function saveStation(){
    if(!form.value.name)return;saving.value=true
    try{
      if(editingId.value){
        await api('/api/stations/'+editingId.value,{method:'PUT',body:form.value})
      }else{
        const res=await api('/api/stations',{method:'POST',body:form.value})
        form.value.id=res.id
      }
      await loadData();closeForm();refreshMarkers(stations.value,{isAdmin:true,onClick:s=>{selectedId.value=s.id}});showToast(editingId.value?'已更新':'添加成功')
    }catch(e){showToast(e.message,'err')}finally{saving.value=false}
  }

  window._editStation=async function(id){
    const s=stations.value.find(x=>x.id===id);if(!s)return
    editingId.value=id;editingPile.value=null;form.value=JSON.parse(JSON.stringify(s));showForm.value=true
  }
  window._delStation=async function(id){
    if(!confirm('确定删除？'))return
    try{await api('/api/stations/'+id,{method:'DELETE'});await loadData();refreshMarkers(stations.value,{isAdmin:true,onClick:s=>{selectedId.value=s.id}});showToast('已删除')}catch(e){showToast(e.message,'err')}
  }

  function addPile(){const p={id:'p'+Date.now().toString(36),...pileForm.value};form.value.piles.push(p);pileForm.value={name:'',type:'快充',power:0,price:0,status:'open'}}
  function startEditPile(p){editingPile.value=p.id;pileForm.value={name:p.name,type:p.type,power:p.power,price:p.price,status:p.status}}
  function saveEditPile(){const i=form.value.piles.findIndex(p=>p.id===editingPile.value);if(i>=0)form.value.piles[i]={id:editingPile.value,...pileForm.value};editingPile.value=null;pileForm.value={name:'',type:'快充',power:0,price:0,status:'open'}}
  function cancelEditPile(){editingPile.value=null;pileForm.value={name:'',type:'快充',power:0,price:0,status:'open'}}
  function removePile(id){form.value.piles=form.value.piles.filter(p=>p.id!==id)}

  function adminExport(){const blob=new Blob([JSON.stringify(stations.value,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='充电站备份.json';a.click();showToast('导出成功')}
  function triggerImport(){fileIn.value.click()}
  async function adminImport(e){
    const file=e.target.files[0];if(!file)return
    try{const data=JSON.parse(await file.text());if(!Array.isArray(data))throw new Error('格式错误');for(const s of data){await api('/api/stations',{method:'POST',body:s})};await loadData();refreshMarkers(stations.value,{isAdmin:true,onClick:s=>{selectedId.value=s.id}});showToast('导入'+data.length+'个')}catch(e){showToast('导入失败:'+e.message,'err')};fileIn.value.value=''
  }

  window._userView=function(id){const s=stations.value.find(x=>x.id===id);if(s){detailStation.value=s;showStation.value=true;loadStationPhotos(id)}}
  function openPayModal(s,p){payTarget.value={stationId:s.id,stationName:s.name,pileId:p.id,pileName:p.name,pilePrice:p.price};payDur.value=1;showPay.value=true}
  async function confirmPay(){
    if(!payTarget.value)return;paying.value=true
    try{await api('/api/sessions',{method:'POST',body:{station_id:payTarget.value.stationId,pile_id:payTarget.value.pileId,duration:payDur.value,amount:+(payTarget.value.pilePrice*payDur.value).toFixed(2)}});showPay.value=false;payTarget.value=null;await loadData();sessions.value=await api('/api/sessions');refreshMarkers(stations.value,{isAdmin:false,onClick:s=>{detailStation.value=s;showStation.value=true}});showToast('支付成功！充电桩已激活')}catch(e){showToast(e.message,'err')}finally{paying.value=false}
  }
  async function stopSession(sid){try{await api('/api/sessions/'+sid+'/stop',{method:'PUT'});await loadData();sessions.value=await api('/api/sessions');refreshMarkers(stations.value,{isAdmin:false,onClick:s=>{detailStation.value=s;showStation.value=true}});showToast('充电已停止')}catch(e){showToast(e.message,'err')}}

  const statusText=s=>({open:'营业中',closed:'已关闭',maintenance:'维护中'}[s]||'未知')
  function showToast(msg,type='ok'){toast.value={text:msg,type};setTimeout(()=>toast.value={text:'',type:'ok'},2500)}
